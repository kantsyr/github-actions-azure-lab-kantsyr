name: Configure Azure environment

on:
  pull_request:
    types: [labeled]

env:
  IMAGE_REGISTRY_URL: ghcr.io
  AZURE_RESOURCE_GROUP: cd-with-actions-2
  AZURE_APP_PLAN: actions-ttt-deployment
  AZURE_LOCATION: eastus
  AZURE_WEBAPP_NAME: kantsyr-ttt-app

jobs:
  setup-up-azure-resources:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'spin up environment')

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Azure resource group
        run: |
          az group create \
            --location ${{ env.AZURE_LOCATION }} \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Azure app service plan (SKIP)
        run: echo "skip deployment for lab"

      - name: Create webapp resource (SKIP)
        run: echo "skip deployment for lab"

      - name: Configure webapp (SKIP)
        run: echo "skip deployment for lab"

  destroy-azure-resources:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'destroy environment')

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Destroy Azure environment
        run: |
          az group delete \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --yes \
            --no-wait
